<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONE | منصة تعليم المستقبل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 500: '#D4AF37', 600: '#B8860B' },
                        dark: '#121212',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #121212; overflow-x: hidden; }
        .gold-gradient {
            background: linear-gradient(90deg, #D4AF37 0%, #F1C40F 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* شاشة التحميل */
        #loader {
            position: fixed; inset: 0; background: #121212; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="text-gray-100">

    <!-- 1. شاشة التحميل (Preloader) -->
    <div id="loader">
        <div class="text-4xl font-black gold-gradient animate-pulse">ZONE...</div>
    </div>

    <!-- 2. شريط الإشعارات المتحرك -->
    <div class="bg-gold-500 text-black text-center py-1.5 text-xs font-bold border-b border-yellow-600">
        <div class="animate-pulse">🔥 عرض خاص: سجل الآن واحصل على وصول مجاني للمصادر الحصرية! 🔥</div>
    </div>

    <!-- Navigation -->
    <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-gold-500/30">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-3xl font-black tracking-tighter gold-gradient italic">ZONE.</div>
            <div class="flex items-center gap-4">
                <span id="welcomeName" class="hidden text-gold-500 font-bold ml-4"></span>
                <button onclick="openAuthModal()" id="navAuthBtn" class="bg-gold-500 text-black px-6 py-2 rounded-lg font-bold hover:bg-gold-600 transition shadow-[0_0_15px_rgba(212,175,55,0.3)] animate-bounce">ابدأ الآن</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative py-32 px-6 overflow-hidden bg-dark">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="container mx-auto text-center relative z-10">
            <h1 class="text-6xl md:text-8xl font-black mb-6">مرحباً بك في <span class="gold-gradient">ZONE</span></h1>
            <p class="text-xl text-gray-400 mb-10 max-w-2xl mx-auto font-light">المنصة التعليمية الأقوى لتعلم البرمجة. سجل حسابك وابدأ رحلة الاحتراف فوراً.</p>
            <button onclick="openAuthModal()" class="bg-gold-500 text-black px-10 py-4 rounded-xl font-black text-lg hover:scale-105 transition-all shadow-lg shadow-gold-500/20">انضم إلينا مجاناً</button>
        </div>
    </header>

    <!-- 3. نافذة التسجيل المحدثة (Modal) -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4 backdrop-blur-md">
        <div class="bg-dark border border-gold-500/50 p-8 rounded-3xl max-w-lg w-full relative shadow-[0_0_50px_rgba(212,175,55,0.1)]">
            <button onclick="closeAuthModal()" class="absolute top-5 left-5 text-gray-500 hover:text-white transition text-xl">✕</button>
            
            <div id="authContent">
                <h2 class="text-3xl font-bold mb-2 gold-gradient text-center" id="modalTitle">إنشاء حساب جديد</h2>
                <p class="text-gray-400 text-center mb-8 text-sm">كن جزءاً من مجتمع ZONE التعليمي</p>
                
                <div class="grid grid-cols-2 gap-4 mb-4" id="nameInputs">
                    <div>
                        <label class="block text-xs text-gold-500/70 mb-2 mr-1">الاسم الأول</label>
                        <input type="text" id="firstName" placeholder="أحمد" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-gold-500 transition text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gold-500/70 mb-2 mr-1">اسم العائلة</label>
                        <input type="text" id="lastName" placeholder="محمد" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-gold-500 transition text-white">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gold-500/70 mb-2 mr-1">البريد الإلكتروني</label>
                        <input type="email" id="userEmail" placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-gold-500 transition text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gold-500/70 mb-2 mr-1">رمز الدخول (6 أرقام للخصوصية)</label>
                        <input type="number" id="userPin" oninput="if(value.length>6)value=value.slice(0,6)" placeholder="••••••" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-gold-500 transition text-center text-2xl tracking-[10px] text-gold-500 font-bold">
                    </div>
                    <button onclick="handleAuth()" id="authBtn" class="w-full bg-gold-500 text-black font-black py-4 rounded-xl mt-4 hover:bg-gold-600 transition-all shadow-lg shadow-gold-500/30">تأكيد وإنشاء الحساب</button>
                    <p id="authMsg" class="text-center text-sm mt-4 min-h-[20px]"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إخفاء الشاشة التحميلية
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
            updateUI();
        });

        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        // تحديث الواجهة إذا كان مسجل دخول
        function updateUI() {
            const savedName = localStorage.getItem('zone_user_name');
            if (savedName) {
                document.getElementById('welcomeName').innerText = "أهلاً، " + savedName;
                document.getElementById('welcomeName').classList.remove('hidden');
                document.getElementById('navAuthBtn').innerText = "لوحة التحكم";
                document.getElementById('navAuthBtn').classList.remove('animate-bounce');
                
                // تعديل المودال ليكون تسجيل دخول فقط
                document.getElementById('modalTitle').innerText = "تسجيل الدخول";
                document.getElementById('nameInputs').classList.add('hidden');
                document.getElementById('userEmail').value = localStorage.getItem('zone_email');
                document.getElementById('userEmail').readOnly = true;
                document.getElementById('authBtn').innerText = "دخول";
            }
        }

        function handleAuth() {
            const fName = document.getElementById('firstName').value;
            const lName = document.getElementById('lastName').value;
            const email = document.getElementById('userEmail').value;
            const pin = document.getElementById('userPin').value;
            const msg = document.getElementById('authMsg');

            const isRegistered = localStorage.getItem('zone_pin');

            if (!isRegistered) {
                // تسجيل جديد
                if (!fName || !lName || !email.includes('@') || pin.length !== 6) {
                    msg.innerText = "برجاء ملء جميع البيانات بشكل صحيح";
                    msg.className = "text-center text-sm mt-4 text-red-500 font-bold";
                    return;
                }
                localStorage.setItem('zone_user_name', fName + " " + lName);
                localStorage.setItem('zone_email', email);
                localStorage.setItem('zone_pin', pin);
                msg.innerText = "تم إنشاء حسابك يا " + fName + "! جاري التحويل...";
            } else {
                // دخول
                if (pin === localStorage.getItem('zone_pin')) {
                    msg.innerText = "تم التحقق.. أهلاً بك مجدداً";
                } else {
                    msg.innerText = "الرمز غير صحيح!";
                    msg.className = "text-center text-sm mt-4 text-red-500 font-bold";
                    return;
                }
            }
            
            msg.className = "text-center text-sm mt-4 text-green-500 font-bold";
            setTimeout(() => window.location.href = "dashboard.html", 1500);
        }
    </script>
</body>
</html>
