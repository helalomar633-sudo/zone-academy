<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTech Academy | منصة تعليم المستقبل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-indigo-600">NexTech</div>
            <div class="hidden md:flex space-x-reverse space-x-8 text-gray-700 font-medium">
                <a href="#" class="hover:text-indigo-600">الرئيسية</a>
                <a href="#" class="hover:text-indigo-600">المقررات</a>
                <a href="#" class="hover:text-indigo-600">المدربون</a>
                <a href="#" class="hover:text-indigo-600">الإعلانات</a>
            </div>
            <div class="flex items-center space-x-reverse space-x-4">
                <button class="text-gray-600 font-medium">تسجيل دخول</button>
                <button class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700 transition">ابدأ الآن</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-gradient-to-r from-indigo-900 to-purple-800 text-white py-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-bold mb-6">تعلم التقنيات الحديثة من الصفر حتى الاحتراف</h1>
            <p class="text-xl mb-10 text-indigo-100">انضم إلى أكثر من 50,000 طالب وطور مهاراتك في البرمجة، الذكاء الاصطناعي، والأمن السيبراني.</p>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <button class="bg-white text-indigo-900 px-8 py-3 rounded-lg font-bold text-lg">تصفح الدورات</button>
                <button class="border-2 border-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-white hover:text-indigo-900">انضم كمدرب</button>
            </div>
        </div>
    </header>

</body>
</html>
