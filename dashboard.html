<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Dashboard | لوحة تحكم الطالب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 500: '#D4AF37', 600: '#B8860B' },
                        dark: '#121212',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #000; }
        .gold-gradient {
            background: linear-gradient(90deg, #D4AF37 0%, #F1C40F 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-black text-gray-100">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-dark border-l border-white/5 hidden md:block">
            <div class="p-6 text-3xl font-black tracking-tighter gold-gradient italic">ZONE.</div>
            <nav class="mt-10 px-4 space-y-2">
                <a href="#" class="block py-2.5 px-4 rounded bg-gold-500 text-black font-bold">لوحة التحكم</a>
                <a href="#" class="block py-2.5 px-4 rounded hover:bg-white/5 transition">كورساتي</a>
                <a href="#" class="block py-2.5 px-4 rounded hover:bg-white/5 transition">الإعلانات</a>
                <a href="#" class="block py-2.5 px-4 rounded hover:bg-white/5 transition">المصادر</a>
                <button onclick="handleLogout()" class="w-full text-right block py-2.5 px-4 rounded hover:bg-red-600/20 text-red-500 transition mt-10">تسجيل الخروج</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 bg-[radial-gradient(circle_at_top_left,_var(--tw-gradient-stops))] from-dark via-black to-black">
            <!-- Top Header -->
            <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
                <div>
                    <h1 class="text-2xl font-bold">مرحباً بك يا <span id="displayFirstName" class="text-gold-500">بطل</span>! 👋</h1>
                    <p class="text-gray-500 text-sm">استكمل رحلتك التعليمية في ZONE.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-left hidden sm:block">
                        <p id="fullName" class="text-sm font-bold">جاري التحميل...</p>
                        <p id="userEmailDisplay" class="text-[10px] text-gray-500"></p>
                    </div>
                    <!-- دائرة الحرف الأول -->
                    <div id="userInitials" class="w-12 h-12 bg-gold-500 rounded-full flex items-center justify-center border-2 border-gold-600 text-black font-black text-xl shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                        ؟
                    </div>
                </div>
            </header>

            <!-- Progress Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-dark p-6 rounded-2xl border border-white/5 hover:border-gold-500/30 transition">
                    <p class="text-gray-500 text-sm mb-1">كورسات مكتملة</p>
                    <h3 class="text-3xl font-black text-gold-500">12</h3>
                </div>
                <div class="bg-dark p-6 rounded-2xl border border-white/5 hover:border-gold-500/30 transition">
                    <p class="text-gray-500 text-sm mb-1">ساعات التعلم</p>
                    <h3 class="text-3xl font-black text-white">48 <span class="text-sm font-normal text-gray-400">ساعة</span></h3>
                </div>
                <div class="bg-dark p-6 rounded-2xl border border-white/5 hover:border-gold-500/30 transition">
                    <p class="text-gray-500 text-sm mb-1">المستوى الحالي</p>
                    <h3 class="text-3xl font-black text-green-500">متقدم</h3>
                </div>
            </div>

            <!-- Active Courses -->
            <h2 class="text-xs font-black mb-6 italic uppercase tracking-[3px] text-gray-600 border-r-4 border-gold-500 pr-3">تواصل التقدم</h2>
            <div class="space-y-4">
                <div class="bg-dark p-5 rounded-xl flex flex-col md:flex-row md:items-center justify-between border border-white/5 hover:bg-white/[0.02] transition">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-white/5 rounded-lg flex items-center justify-center text-gold-500 font-black border border-white/10 italic">React</div>
                        <div>
                            <h4 class="font-bold text-gray-100">احتراف تطوير الواجهات بـ React</h4>
                            <p class="text-[10px] text-gray-500 italic">المدرب: م. علي حسن</p>
                        </div>
                    </div>
                    <div class="w-full md:w-64 mt-4 md:mt-0">
                        <div class="flex justify-between text-[10px] mb-1.5 text-gray-400">
                            <span>نسبة الإنجاز</span>
                            <span class="text-gold-500 font-bold">75%</span>
                        </div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-gold-500 h-full w-[75%] shadow-[0_0_10px_#D4AF37]"></div>
                        </div>
                    </div>
                    <button class="mt-4 md:mt-0 bg-gold-500 text-black px-6 py-2 rounded-lg text-sm font-bold hover:bg-gold-600 transition">متابعة الدرس</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // كود الربط وجلب البيانات
        window.addEventListener('load', () => {
            const name = localStorage.getItem('z_name');
            const email = localStorage.getItem('z_mail');

            // إذا لم يسجل دخول، ارجع لصفحة التسجيل
            if (!name) {
                window.location.href = "index.html";
                return;
            }

            // تحديث البيانات في الصفحة
            document.getElementById('fullName').innerText = name;
            document.getElementById('displayFirstName').innerText = name.split(' ')[0]; // أول اسم فقط
            document.getElementById('userEmailDisplay').innerText = email;
            
            // تحديث حرف الدائرة
            document.getElementById('userInitials').innerText = name.charAt(0);
        });

        // تسجيل الخروج
        function handleLogout() {
            if(confirm("هل تريد تسجيل الخروج؟ سيتم حذف بياناتك من هذا المتصفح.")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
